version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - env | grep -e DATABASE_URL -e PAYLOAD_SECRET -e NEXT_PUBLIC_ -e STRIPE_ -e SHOPIFY_ -e AWS_ -e S3_ > .env.production
        - npm run build
        # Trim unused SWC binaries to keep the deployment under the 220MB Amplify limit.
        - rm -f node_modules/@swc/core-linux-x64-gnu/swc.linux-x64-gnu.node
        - rm -f node_modules/@swc/core-linux-x64-musl/swc.linux-x64-musl.node
        - rm -rf node_modules/@swc/core-linux-arm64-gnu
        - rm -rf node_modules/@swc/core-linux-arm64-musl
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
      - .next/cache/**/*
